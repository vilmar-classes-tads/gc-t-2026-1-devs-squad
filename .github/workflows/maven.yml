name: Java CI com Maven (Fluxo por Features)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**' # Captura qualquer push em branches como feature/issue0, feature/login, etc.
      - 'bugfix/**'  # Captura qualquer push em branches como bugfix/issue0, bugfix/login, etc.
      - 'hotfix/**'  # Captura qualquer push em branches como hotfix/issue0, hotfix/login, etc.
      - 'release/**'  # Captura qualquer push em branches como release/issue0, release/login, etc.
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compilar, executar testes e gerar o JAR com o Maven
      run: mvn clean package

    - name: Construir imagem Docker
      run: docker build -t sistema-editais:ci .

    - name: Executar container Docker
      run: docker run --rm sistema-editais:ci
